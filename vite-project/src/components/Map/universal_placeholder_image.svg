    <path d="M0 -30 C-18 -30 -28 -18 -28 -6 C-28 12 0 36 0 36 C0 36 28 12 28 -6 C28 -18 18 -30 0 -30 Z" fill="#8a9bb0" style="fill:rgb(138, 155, 176);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
